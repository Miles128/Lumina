name: CI

on:
  push:
    branches: [main, master, "feat/**", "fix/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      LUMINA_DATA_DIR: ${{ github.workspace }}/.lumina-ci
      SECRETARY_AUTO_SYNC_ENABLED: "false"
      SECRETARY_BRIEFING_ENABLED: "false"
      SECRETARY_THINK_ENABLED: "false"
      SECRETARY_MEMORY_SUMMARY_ENABLED: "false"
      PROMPT_GATE_ENABLED: "false"
      MCP_AUTO_FILESYSTEM: "false"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv run playwright install --with-deps chromium

      - name: Prepare CI data directory
        run: mkdir -p "$LUMINA_DATA_DIR"

      - name: Lint (ruff)
        run: uv run ruff check src tests --ignore E501

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -q -m "not ui"

      - name: E2E (API + Playwright UI)
        run: bash scripts/e2e-smoke.sh
