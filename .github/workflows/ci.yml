name: CI

on:
  push:
    branches: [main, master, "feat/**", "fix/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      LUMINA_DATA_DIR: ${{ github.workspace }}/.lumina-ci
      SECRETARY_AUTO_SYNC_ENABLED: "false"
      SECRETARY_BRIEFING_ENABLED: "false"
      SECRETARY_THINK_ENABLED: "false"
      SECRETARY_MEMORY_SUMMARY_ENABLED: "false"
      PROMPT_GATE_ENABLED: "false"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare CI data directory
        run: mkdir -p "$LUMINA_DATA_DIR"

      - name: Run tests
        run: pytest -q
