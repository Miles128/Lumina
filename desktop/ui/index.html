<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵犀 · Lumina</title>
    <link rel="icon" type="image/png" href="/assets/logo.png?v=3" />
    <link rel="stylesheet" href="/assets/tokens.css?v=2" />
    <link rel="stylesheet" href="/assets/chat.css?v=36" />
    <link rel="stylesheet" href="/assets/topbar-lite.css?v=5" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="brand-lockup">
            <img class="logo-mark" src="/assets/logo.png?v=3" alt="" width="32" height="32" decoding="async" />
            <span class="logo" data-i18n="app.name">Lumina · 灵犀</span>
          </div>
          <span class="topbar-sep" aria-hidden="true">—</span>
          <span class="topbar-model" id="topbar-model" data-i18n-title="model.current">加载中…</span>
        </div>
        <div class="topbar-right">
          <div class="token-usage" data-i18n-title="token.usage">
            <span data-i18n="token.label">Token</span>
            <strong id="token-usage-value">0</strong>
          </div>
          <div class="topbar-menu-wrap">
            <button id="btn-topbar-menu" class="topbar-menu-btn" type="button" aria-expanded="false">
              <span class="sr-only">Menu</span>
              <span class="hamburger" aria-hidden="true">
                <span></span><span></span><span></span>
              </span>
            </button>
            <nav id="topbar-menu" class="topbar-menu" hidden>
              <button id="btn-skills" type="button" data-i18n="menu.skills">技能</button>
              <button id="btn-platforms" type="button" data-i18n="menu.settings">设置</button>
              <button id="btn-kb" type="button" data-i18n="menu.knowledge">知识库</button>
              <button id="btn-about" type="button" data-i18n="menu.about">关于</button>
            </nav>
          </div>
        </div>
      </header>

      <div id="about-backdrop" class="overlay" hidden></div>
      <aside id="about-panel" class="about-panel" hidden>
        <header class="about-panel-head">
          <span data-i18n="about.title">关于灵犀</span>
          <button id="btn-close-about" type="button" data-i18n-aria="action.close">×</button>
        </header>
        <div class="about-panel-body">
          <div class="about-brand">
            <div class="about-logo-wrap">
              <img class="about-logo" src="/assets/logo.png?v=3" alt="Lumina · 灵犀" decoding="async" />
            </div>
            <p class="about-product" data-i18n="app.name">Lumina · 灵犀</p>
          </div>
          <p><span class="about-label" data-i18n="about.developer">开发者</span><span>四海</span></p>
          <p><span class="about-label" data-i18n="about.email">邮箱</span><a href="mailto:myx28@qq.com">myx28@qq.com</a></p>
          <p><span class="about-label" data-i18n="about.version">版本号</span><span>0.1.0</span></p>
        </div>
      </aside>

      <div class="workspace">
        <aside class="chat-sidebar">
          <div class="chat-sidebar-head">
            <button id="btn-new-thread" type="button" class="new-thread-btn" title="新对话 (Ctrl+N)" data-i18n-title="chat.newThread" data-i18n-aria="chat.newThread">
              <svg class="new-thread-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              <span class="new-thread-label sr-only" data-i18n="chat.newThread">新对话</span>
            </button>
          </div>
          <nav id="thread-list" class="thread-list"></nav>
        </aside>

        <section class="chat-column">
          <main class="main">
            <div class="main-inner">
              <section id="welcome" class="hero">
                <h1 data-i18n="chat.welcome">有什么可以帮你？</h1>
                <div class="prompts">
                  <button class="prompt" type="button" data-i18n="prompt.reading.label" data-i18n-prompt="prompt.reading">最近在读什么</button>
                  <span class="prompt-sep">·</span>
                  <button class="prompt" type="button" data-i18n="prompt.schedule.label" data-i18n-prompt="prompt.schedule">今天安排</button>
                  <span class="prompt-sep">·</span>
                  <button class="prompt" type="button" data-i18n="prompt.profile.label" data-i18n-prompt="prompt.profile">个人画像</button>
                </div>
              </section>

              <div id="messages" class="thread"></div>
              <div id="typing" class="typing" hidden>
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <span id="typing-text" class="typing-text" data-i18n="chat.processing">正在处理…</span>
                <button id="btn-pause" class="typing-pause" type="button" data-i18n="action.pause">暂停</button>
              </div>
              <div id="agent-progress" class="agent-progress" hidden>
                <div id="subagent-tree" class="subagent-tree" hidden></div>
                <ul id="agent-progress-list"></ul>
              </div>
            </div>
          </main>

          <footer class="composer-wrap">
            <form id="chat-form" class="composer">
              <div class="agent-mode-picker" id="agent-mode-picker">
                <button type="button" class="agent-mode-btn" id="agent-mode-btn" aria-haspopup="listbox" aria-expanded="false" title="Agent 模式">
                  <span class="agent-mode-label" id="agent-mode-label">Build</span>
                  <svg class="agent-mode-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
                    <path d="M6 9l6 6 6-6"/>
                  </svg>
                </button>
                <ul class="agent-mode-menu" id="agent-mode-menu" role="listbox" hidden>
                  <li role="option" data-mode="build">
                    <strong>Build · 执行</strong>
                    <span>可读写工具 + 子 Agent 委派</span>
                  </li>
                  <li role="option" data-mode="ask">
                    <strong>Ask · 问答</strong>
                    <span>只读检索，不改文件不跑 shell</span>
                  </li>
                  <li role="option" data-mode="plan">
                    <strong>Plan · 规划</strong>
                    <span>只读分析 + 待办，输出计划</span>
                  </li>
                </ul>
              </div>
              <textarea
                id="chat-input"
                rows="1"
                data-i18n-placeholder="chat.placeholder"
                placeholder="Message"
                maxlength="4000"
              ></textarea>
              <button type="submit" id="btn-send" class="composer-send" data-i18n-aria="action.send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
              </button>
            </form>
          </footer>
        </section>
      </div>

      <div id="skills-backdrop" class="overlay" hidden></div>
      <aside id="skills-panel" class="sheet sheet-skills" hidden>
        <header class="sheet-head sheet-head-skills">
          <button id="btn-close-skills" type="button" data-i18n-aria="action.close">×</button>
          <span class="sheet-title" data-i18n="skills.title">技能管理</span>
          <nav id="skills-nav" class="skills-top-tabs"></nav>
        </header>
        <div class="sheet-body sheet-body-skills">
          <div id="skills-content" class="sheet-main sheet-main-skills">
            <p class="muted" data-i18n="settings.loading">加载中…</p>
          </div>
        </div>
        <div id="skill-detail-modal" class="skill-detail-modal" hidden>
          <div class="skill-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="skill-detail-title">
            <div id="skill-detail-body"></div>
          </div>
        </div>
      </aside>

      <div id="settings-backdrop" class="overlay" hidden></div>
      <aside id="settings-panel" class="sheet" hidden>
        <header class="sheet-head">
          <button id="btn-close-settings" type="button" data-i18n-aria="action.close">×</button>
          <span data-i18n="settings.title">设置</span>
        </header>
        <div class="sheet-body">
          <nav id="settings-nav" class="sheet-nav"></nav>
          <div id="settings-content" class="sheet-main">
            <p class="muted" data-i18n="settings.loading">加载中…</p>
          </div>
        </div>
      </aside>
    </div>

    <script src="/assets/vendor/markdown-it.min.js?v=1"></script>
    <script src="/assets/vendor/purify.min.js?v=1"></script>
    <script src="/assets/markdown.js?v=1"></script>
    <script src="/assets/i18n.js?v=10"></script>
    <script src="/assets/api.js?v=2"></script>
    <script src="/assets/location.js?v=5"></script>
    <script src="/assets/topbar.js?v=4"></script>
    <script src="/assets/settings.js?v=10"></script>
    <script src="/assets/skills.js?v=5"></script>
    <script src="/assets/chat.js?v=43"></script>
    <script>
      window.LuminaI18n?.applyDocument();
    </script>
  </body>
</html>
