<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵犀</title>
    <link rel="stylesheet" href="/assets/tokens.css?v=2" />
    <link rel="stylesheet" href="/assets/chat.css?v=20" />
    <link rel="stylesheet" href="/assets/topbar-lite.css?v=3" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <span class="logo">灵犀</span>
          <span class="topbar-sep" aria-hidden="true">—</span>
          <span class="topbar-model" id="topbar-model" title="当前大模型">加载中…</span>
        </div>
        <div class="topbar-right">
          <div class="token-usage" title="累计 token 消耗">
            <span>Token</span>
            <strong id="token-usage-value">0</strong>
          </div>
          <div class="topbar-menu-wrap">
            <button id="btn-topbar-menu" class="topbar-menu-btn" type="button" aria-expanded="false">
              <span class="sr-only">菜单</span>
              <span class="hamburger" aria-hidden="true">
                <span></span><span></span><span></span>
              </span>
            </button>
            <nav id="topbar-menu" class="topbar-menu" hidden>
              <button id="btn-skills" type="button">技能</button>
              <button id="btn-platforms" type="button">设置</button>
              <button id="btn-kb" type="button">知识库</button>
              <button id="btn-sync" type="button">同步</button>
              <button id="btn-about" type="button">关于</button>
            </nav>
          </div>
        </div>
      </header>

      <div id="about-backdrop" class="overlay" hidden></div>
      <aside id="about-panel" class="about-panel" hidden>
        <header class="about-panel-head">
          <span>关于灵犀</span>
          <button id="btn-close-about" type="button" aria-label="关闭">×</button>
        </header>
        <div class="about-panel-body">
          <p><span class="about-label">开发者</span><span>四海</span></p>
          <p><span class="about-label">邮箱</span><a href="mailto:myx28@qq.com">myx28@qq.com</a></p>
          <p><span class="about-label">版本号</span><span>0.0.1</span></p>
        </div>
      </aside>

      <div class="workspace">
        <aside class="chat-sidebar">
          <div class="chat-sidebar-head">
            <button id="btn-new-thread" type="button">新对话</button>
          </div>
          <nav id="thread-list" class="thread-list"></nav>
        </aside>

        <section class="chat-column">
          <main class="main">
            <div class="main-inner">
              <section id="welcome" class="hero">
                <h1>有什么可以帮你？</h1>
                <div class="prompts">
                  <button class="prompt" type="button" data-prompt="总结一下我最近在读什么">最近在读什么</button>
                  <span class="prompt-sep">·</span>
                  <button class="prompt" type="button" data-prompt="帮我看看今天的日程和待办">今天安排</button>
                  <span class="prompt-sep">·</span>
                  <button class="prompt" type="button" data-prompt="我的个人信息画像是什么样的">个人画像</button>
                </div>
              </section>

              <div id="messages" class="thread"></div>
              <div id="typing" class="typing" hidden>
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <span id="typing-text" class="typing-text">正在处理…</span>
                <button id="btn-pause" class="typing-pause" type="button">暂停</button>
              </div>
              <div id="agent-progress" class="agent-progress" hidden>
                <ul id="agent-progress-list"></ul>
              </div>
            </div>
          </main>

          <footer class="composer-wrap">
            <form id="chat-form" class="composer">
              <textarea
                id="chat-input"
                rows="1"
                placeholder="Message"
                maxlength="4000"
              ></textarea>
              <button type="submit" id="btn-send" class="composer-send" aria-label="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
              </button>
            </form>
          </footer>
        </section>
      </div>

      <div id="skills-backdrop" class="overlay" hidden></div>
      <aside id="skills-panel" class="sheet sheet-skills" hidden>
        <header class="sheet-head sheet-head-skills">
          <button id="btn-close-skills" type="button" aria-label="关闭">×</button>
          <span class="sheet-title">技能管理</span>
          <nav id="skills-nav" class="skills-top-tabs"></nav>
        </header>
        <div class="sheet-body sheet-body-skills">
          <div id="skills-content" class="sheet-main sheet-main-skills">
            <p class="muted">加载中…</p>
          </div>
        </div>
        <div id="skill-detail-modal" class="skill-detail-modal" hidden>
          <div class="skill-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="skill-detail-title">
            <div id="skill-detail-body"></div>
          </div>
        </div>
      </aside>

      <div id="settings-backdrop" class="overlay" hidden></div>
      <aside id="settings-panel" class="sheet" hidden>
        <header class="sheet-head">
          <button id="btn-close-settings" type="button" aria-label="关闭">×</button>
          <span>设置</span>
        </header>
        <div class="sheet-body">
          <nav id="settings-nav" class="sheet-nav"></nav>
          <div id="settings-content" class="sheet-main">
            <p class="muted">加载中…</p>
          </div>
        </div>
      </aside>
    </div>

    <script src="/assets/api.js?v=2"></script>
    <script src="/assets/topbar.js?v=3"></script>
    <script src="/assets/settings.js?v=3"></script>
    <script src="/assets/skills.js?v=5"></script>
    <script src="/assets/chat.js?v=11"></script>
  </body>
</html>
