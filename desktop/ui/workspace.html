<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shibei · 知识库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Geist:wght@300;400;450;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("lumina.ui.preferences.v1");
          var theme = "light";
          if (raw) {
            var p = JSON.parse(raw);
            if (["light", "dark", "paper"].includes(p && p.theme)) theme = p.theme;
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/tokens.css?v=3" />
    <link rel="stylesheet" href="/assets/workspace.css?v=5" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-brand">
          <span class="topbar-title">Shibei 知识库</span>
          <span id="kb-status-badge" class="kb-badge">加载中</span>
        </div>
        <div class="topbar-actions">
          <button id="btn-import" class="btn primary" type="button">导入</button>
          <a href="/" class="btn ghost">返回对话</a>
        </div>
      </header>

      <div id="kb-empty" class="kb-empty" hidden>
        <h2>Shibei 尚未就绪</h2>
        <p id="kb-empty-message">请在 Shibei 项目的 config.yaml 中配置知识库，并在设置里填写 Shibei 安装路径。</p>
      </div>

      <div id="kb-layout" class="kb-layout" hidden>
        <aside class="kb-sidebar">
          <section class="kb-panel">
            <h3 class="kb-panel-title">概览</h3>
            <dl id="kb-stats" class="kb-stats"></dl>
            <div id="kb-tags" class="kb-tags"></div>
          </section>
          <section class="kb-panel kb-panel-grow">
            <h3 class="kb-panel-title">已索引文档</h3>
            <div id="kb-sources" class="kb-sources"></div>
            <button id="btn-load-more" class="btn ghost kb-load-more" type="button" hidden>加载更多</button>
          </section>
        </aside>

        <main class="kb-main">
          <form id="kb-search-form" class="kb-search-form">
            <input id="kb-search-input" type="search" placeholder="语义搜索 Shibei 知识库…" autocomplete="off" />
            <button type="submit" class="btn primary">搜索</button>
          </form>
          <div id="kb-search-results" class="kb-search-results" hidden></div>
          <article id="kb-preview" class="kb-preview">
            <header class="kb-preview-head">
              <h2 id="kb-preview-title">选择左侧文档或搜索</h2>
              <span id="kb-preview-path" class="kb-preview-path"></span>
            </header>
            <pre id="kb-preview-body" class="kb-preview-body"></pre>
          </article>
        </main>
      </div>
    </div>

    <script src="/assets/api.js"></script>
    <script src="/assets/workspace.js?v=4"></script>
  </body>
</html>
