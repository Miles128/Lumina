<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵犀</title>
    <link rel="stylesheet" href="/assets/tokens.css?v=2" />
    <link rel="stylesheet" href="/assets/mascot.css?v=3" />
  </head>
  <body>
    <div class="mascot-shell">
      <header class="mascot-titlebar">
        <span>灵犀</span>
        <button id="btn-minimize">—</button>
        <button id="btn-close">×</button>
      </header>
      <div class="mascot-stage-wrap">
        <div id="mascot" class="mascot" data-state="idle">
          <div class="mascot-hair"></div>
          <div class="mascot-face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="mouth"></div>
          </div>
          <div class="mascot-body"><div class="badge">秘</div></div>
          <div class="mascot-arm left"></div>
          <div class="mascot-arm right"></div>
        </div>
      </div>
      <p id="mascot-speech" class="mascot-speech">点我打开知识库，或输入问题。</p>
      <form id="mascot-form" class="mascot-form">
        <input id="mascot-input" type="text" placeholder="快速提问..." maxlength="500" />
        <button type="submit">问</button>
      </form>
      <div class="mascot-actions">
        <button id="btn-open-workspace">打开知识库</button>
        <button id="btn-quick-sync">同步</button>
      </div>
    </div>
    <script src="/assets/api.js"></script>
    <script src="/assets/mascot.js"></script>
  </body>
</html>
